name: C/C++ CI Pipeline & Epitech Mirror

# Workflow triggers
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # --- BUILD AND TEST ---
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Download dependencies
        run: |
          chmod +x ./setup.sh
          ./setup.sh

      - name: Make configuration
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

      - name: Compilation
        run: cmake --build ${{github.workspace}}/build --config Release -j 4

      - name: Tests
        working-directory: ${{github.workspace}}/build
        run: ctest -C Release --output-on-failure

  # --- MIRROR TO EPITECH ---
  mirror_to_epitech:
    runs-on: ubuntu-latest

    needs: build-and-test

    if: github.repository == 'Nexlein/Arcade' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Push to Epitech Mirror
        run: |
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add epitechArcade git@github.com:EpitechPGE2-2025/G-OOP-400-MPL-4-1-arcade-5.git
          git push epitechArcade --mirror
